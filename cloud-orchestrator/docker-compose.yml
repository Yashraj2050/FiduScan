version: "3.9"

services:
  # ─── FastAPI Backend ────────────────────────────────────────────────────────
  backend:
    build:
      context: ..
      dockerfile: cloud-orchestrator/Dockerfile.backend
    container_name: fiduscan-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ../models:/app/models:ro          # Read-only model artifacts
      - ../logs:/app/logs                  # Writable logs
    environment:
      - PYTHONUNBUFFERED=1
      - FIDUSCAN_ENV=production
    networks:
      - fiduscan-net
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ─── Next.js Frontend ────────────────────────────────────────────────────────
  frontend:
    build:
      context: ..
      dockerfile: cloud-orchestrator/Dockerfile.frontend
    container_name: fiduscan-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
      - NODE_ENV=production
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - fiduscan-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

networks:
  fiduscan-net:
    driver: bridge

volumes:
  fiduscan-logs:
    driver: local
